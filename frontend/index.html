<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Murder in Olympus</title>
    <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/src/styles.css">
    <link rel="stylesheet" href="/src/GameStyle.css">
</head>
<body>

<!-- join  Lobby page -->

<div class="page join-page" id="joinpage">
    <div class="card">
        <h1>Join Lobby</h1>
        <p class="subtitle">Enter your name and room code</p>

        <div class="field">
            <label>Display Name</label>
            <input type="text" id="displayname" placeholder="Your name">
        </div>

        <div class="field">
            <label>Room Code</label>
            <input type="text" id="roomcode" placeholder="ABC123">
        </div>

        <button class="primary" id="joinbtn">Join Room</button>

        <div class="alt-action">
            <span>or</span>
            <a href="#" id="createroomlink">create a room</a>
        </div>

        <div class="error-message" id="join-error">
            
        </div>

        <div class="error-message" id="display-name-error">
            
        </div>
    </div>
</div>
<!-- join  Lobby page -->

<!-- lobby page -->

<div class="page lobby-page hidden" id="lobby">

    <button class="lobby-back-btn" id="backToJoinBtn">
        ← Back
    </button>

    <h2 style="text-align: center;">Room Code: <span id="room-code-display">...</span></h2>

    <div class="lobby">
        <div class="chat-container">
            <div class="chat-header">Chat</div>
            <div class="chat-box"></div>
            <div class="chat-input" id="chat">
                <input type="text" id="chatInput" placeholder="Type a message...">
                <button class="primary" id="sendBtn">Send</button>
            </div>
        </div>

        <aside class="players">
            <h3>Players</h3>
            <ul id ="players-list">
    
            </ul>
        </aside>
    </div>

     <button class="primary hidden" id="startgamebtn">Start Game</button>
</div>

<!-- lobby page -->



<!-- create room page -->

<div class="page create-room-page hidden" id="createroompage">
    <div class="card">
        <h1>Create Room</h1>
        <p class="subtitle">Set up your lobby</p>

        <div class="field">
            <label>Room Name</label>
            <input type="text" id="roomname" placeholder="Room Name">
        </div>

        <div class="field">
            <label>Display Name</label>
            <input type="text" id="create-displayname" placeholder="Your Name">
        </div>

        <div class="field">
            <label>Number of Players</label>
            <select id="playercount">
                <option value="2">2 players</option>
                <option value="3">3 players</option>
                <option value="4">4 players</option>
                <option value="5">5 players</option>
                <option value="6">6 players</option>
                <option value="7">7 players</option>
                <option value="8">8 players</option>
                <option value="9">9 players</option>
                <option value="10">10 players</option>
                <option value="11">11 players</option>
                <option value="12">12 players</option>
                <option value="13">13 players</option>
                <option value="14">14 players</option>
                <option value="15">15 players</option>
            </select>
        </div>

        <button class="primary" id="createroombtn">Create Room</button>

        <div class="alt-action">
            <span>or</span>
            <a href="#" id="joinroomlink">join an existing room</a>
        </div>

        <div class="error-message hidden" id="create-error">
            Error message
        </div>
    </div>
</div>
<!-- create room page -->





<!-- game page -->
<div class="page game-page hidden" id="gamepage">
    
    <div class="intro-screen">
        <div class="intro-main typewriter">Murder in Olympus</div>
        <div class="intro-sub fade-in">game is starting...</div>
    </div>
    
    <div class="actual-game hidden" id="actualGameContent">
        <h1 style="text-align: center; margin-top: 50px; font-family: 'VT323', monospace;">Game Board</h1>
        
        <div id="role-text-container" class="hidden" style="text-align: center; margin-bottom: 20px;">
            <h2 style="margin: 0; color: var(--muted); font-size: 1.2rem;">You are the</h2>
            <h3 id="card-role-text" style="font-size: 2.5rem; margin: 10px 0;"></h3>
        </div>
        
       <div class="card-scene" style="width: 400px; height: 700px; margin: 0 auto;">
            <div class="card-inner" id="roleCard">
                
                <div class="card-face card-face-front" style="background: transparent !important; border: none !important; box-shadow: none !important; padding: 0; margin: 0;">
                    <img src="/public/back_card.png" alt="Card Back" style="width: 100%; height: 100%; object-fit: contain; display: block;">
                </div>

                <div class="card-face card-face-back" style="background: transparent !important; border: none !important; box-shadow: none !important; padding: 0; margin: 0;">
                    <img id="role-image" src="" alt="Role" style="width: 100%; height: 100%; object-fit: contain; display: block;">
                </div>
                
            </div>
        </div>

        <p id="reveal-status-text" style="text-align: center; color: var(--muted); margin-top: 20px;">Revealing role in 5 seconds...</p>
    </div>
</div>
<!-- game page -->



<!-- game messaging page  -->  
<div class="page game-messaging-page hidden" id="gamemessagingpage">
    <h1 class="game-title discussion-title">Discussion Phase</h1>
    
    <div id="discussionTimer" style="text-align: center; font-size: 1.5rem; color: var(--accent); margin: 10px 0;"></div>
    
    <div class="discussion-layout">
        
        <div class="discussion-side-panel">
            <h3 class="role-label">Your Role</h3>
            <img id="messaging-role-image" src="" alt="Role" class="mini-card-image">
            <button id="skipDiscussionBtn" class="hidden" style="width: 100%; padding: 12px; background: #f59e0b; color: white; border: none; border-radius: 5px; font-size: 0.9rem; cursor: pointer; font-weight: bold; margin-top: 15px;">Skip Discussion</button>
        </div>

        <div class="chat-container discussion-chat-override">
            <div class="chat-header">Game Chat</div>
            <div class="chat-box" id="gameChatBox"></div>
            <div class="chat-input" id="game-chat">
                <input type="text" id="gameChatInput" placeholder="Accuse someone...">
                <button class="primary" id="gameSendBtn">Send</button>
            </div>
        </div>
        

        <div class="discussion-side-panel">
            <button id="votebtn" class="vote-btn">VOTE</button>
        </div>

    </div>
</div>
<!-- game messaging page  -->




<script type="module" src="/src/main.js"></script>

</body>
</html>
